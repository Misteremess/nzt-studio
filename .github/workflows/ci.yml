name: CI / Deploy

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production (nzt.hyperfocus.es)"
        required: true
        default: "true"
        type: choice
        options: ["true"]

jobs:

  # ── CI — typecheck + build ──────────────────────────────────────────────────
  # Corre en cada push. Valida que el código compila y pasa los tipos.
  # No necesita secretos de producción: usa valores placeholder, igual que el Dockerfile.
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    env:
      # Placeholders de build — no son secretos reales.
      DATABASE_URL: "postgresql://build:build@localhost:5432/build"
      AUTH_SECRET: "ci-placeholder-do-not-use"
      TOTP_ENCRYPTION_KEY: "ci-placeholder-do-not-use"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Deploy — solo manual (workflow_dispatch) ────────────────────────────────
  # Conecta al VPS por SSH y ejecuta ci-deploy.sh.
  # Los secretos de la app viven en /opt/hyperfocus/nzt/.env en el VPS,
  # no en GitHub Secrets.
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash /opt/hyperfocus/nzt/deploy/scripts/ci-deploy.sh
