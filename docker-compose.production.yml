# Stack de producción: nzt.hyperfocus.es
# Red Traefik: `proxy` (externa, ya existe — gestionada por el stack n8n/Traefik)
# Red interna: `db` (solo postgres ↔ app/migrate, sin exposición externa)
#
# Primer deploy: ver DEPLOY.md §4
# Deploy continuo: deploy/scripts/ci-deploy.sh (o GitHub Actions workflow_dispatch)
#
# Variables requeridas en .env (ver .env.production.example):
#   POSTGRES_ROOT_PASSWORD, NZT_DB_PASSWORD, DATABASE_URL,
#   AUTH_SECRET, TOTP_ENCRYPTION_KEY,
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, GOOGLE_PLACES_API_KEY

name: nzt

services:

  # ── Base de datos ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: nzt
      # Pasada al script de init para crear el usuario de la app sin hardcodear.
      NZT_DB_PASSWORD: ${NZT_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nzt"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Migraciones (solo con --profile tools) ───────────────────────────────────
  # El CI corre este servicio ANTES de (re)arrancar app para garantizar que las
  # migraciones están aplicadas antes de que cualquier instancia conecte a la BD.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["tools"]
    entrypoint: ["node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Aplicación Next.js ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "https://nzt.hyperfocus.es"
      NEXT_PUBLIC_APP_URL: "https://nzt.hyperfocus.es"
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      ANALYZER_MAX_RESULTS: ${ANALYZER_MAX_RESULTS:-20}
      ANALYZER_MAX_RADIUS_METERS: ${ANALYZER_MAX_RADIUS_METERS:-2500}
      ANALYZER_CACHE_TTL_DAYS: ${ANALYZER_CACHE_TTL_DAYS:-7}
    networks:
      - proxy
      - db
    tmpfs:
      - /tmp:mode=1777
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/login > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
      - "traefik.http.routers.nzt-http.rule=Host(`nzt.hyperfocus.es`)"
      - "traefik.http.routers.nzt-http.entrypoints=web"
      - "traefik.http.routers.nzt-http.middlewares=nzt-redirect-https"
      - "traefik.http.routers.nzt-http.priority=1"

      # ── HTTPS ────────────────────────────────────────────────────────────────
      - "traefik.http.routers.nzt.rule=Host(`nzt.hyperfocus.es`)"
      - "traefik.http.routers.nzt.entrypoints=websecure"
      - "traefik.http.routers.nzt.tls=true"
      - "traefik.http.routers.nzt.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nzt.priority=1"
      - "traefik.http.services.nzt.loadbalancer.server.port=3000"

      # ── Middleware redirect ───────────────────────────────────────────────────
      - "traefik.http.middlewares.nzt-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.nzt-redirect-https.redirectscheme.permanent=true"

networks:
  proxy:
    external: true   # Traefik ya está conectado a esta red
  db:
    internal: true   # Solo accesible dentro del stack

volumes:
  pgdata:
