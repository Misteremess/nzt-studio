# Reverse proxy de Nginx → app Next (servicio "app" en la red de compose).
# Funciona en HTTP nada más levantar. Para HTTPS, emite el certificado con
# Certbot (ver DEPLOY.md) y descomenta el bloque server 443 + el redirect.

server {
    listen 80;
    server_name _;

    # Reto ACME de Let's Encrypt (Certbot en modo webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Tras emitir el certificado, redirige todo a HTTPS (descomenta) ---
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # --- Mientras no haya TLS, sirve directamente por HTTP ---
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

